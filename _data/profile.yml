principles:
  - title: "GitHub is the source of truth"
    description: "Documentation stays in the same workflow maintainers already trust: branches, diffs, pull requests, and reviews."
  - title: "Translate only what changed"
    description: "Localization becomes sustainable when the system tracks drift and updates changed artifacts instead of reprocessing everything."
  - title: "Treat translations as versioned assets"
    description: "Markdown, images, and notebooks need explicit state, synchronization signals, and maintainable lifecycle rules."

projects:
  - name: "Localizeflow"
    type: "Product"
    summary: "GitHub-native automation for multilingual docs."
    description: "A zero-setup automation layer that watches repositories and opens pull requests to keep documentation up to date across languages."
    bullets:
      - "No YAML, no API keys, no workflow maintenance"
      - "Visual setup with AI-assisted path recommendations"
      - "Autopilot PRs that stay inside GitHub"
      - "Built from real operating lessons learned in Co-op Translator"
    url: "https://localizeflow.com/"
    cta: "Explore Localizeflow"
  - name: "Co-op Translator"
    type: "Open source"
    summary: "The engine behind multilingual Markdown, image, and notebook translation."
    description: "Maintained in Azure OSS to help fast-moving repositories keep translated artifacts synchronized as the source evolves."
    bullets:
      - "Used across Microsoft learning repositories"
      - "Supports Markdown, images, and Jupyter notebooks"
      - "Designed for large repositories with continuous change"
      - "Manages translation state as inspectable software artifacts"
    url: "https://github.com/Azure/co-op-translator"
    cta: "View the repository"

